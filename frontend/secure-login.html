<script>
// Show the department name saved from sectors.html

var deptSpan = document.querySelector('p span.text-primary-fixed');
if (deptSpan) deptSpan.textContent = dept;
// Also update the header badge if present
document.querySelectorAll('.text-label-sm').forEach(function(el) {
    if (el.textContent.includes('Intelligence')) el.textContent = el.textContent.replace('Intelligence', dept);
});
