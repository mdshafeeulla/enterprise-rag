<style>
        body { background-color: #000000; }
        .glass-panel {
            background: rgba(10, 10, 10, 0.6);

<body class="antialiased text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 z-0 pointer-events-none flex items-center justify-center">
<div class="w-[800px] h-[800px] rounded-full bg-primary-fixed-dim/5 blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-4">
<!-- Brand Header (Floating above card) -->
<div class="text-center mb-stack-md">
<h1 class="font-display-md text-display-md tracking-tighter text-primary-fixed-dim">MSU<div><br></div></h1>
</div>
<div class="glass-panel rounded-xl p-10 glow-border flex flex-col items-center">
<!-- Icon -->
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-stack-md border border-outline-variant/30 shadow-[0_0_20px_rgba(0,219,233,0.1)]">
<span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: &quot;FILL&quot; 0, &quot;wght&quot; 200;">security</span>
</div>
<!-- Headers -->
<h2 class="font-headline-md text-headline-md text-on-surface mb-2 text-center">System Administrator Login</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-stack-lg max-w-[280px]">Enter credentials to access the Aether Command Center.</p>
<!-- Form -->
<form action="#" class="w-full flex flex-col gap-stack-md" method="POST">
<div class="flex items-start gap-3 p-4 rounded-lg bg-error-container/10 border border-error/30 backdrop-blur-md mb-2">
<span class="material-symbols-outlined text-error text-xl shrink-0">report</span>
<p class="font-body-md text-sm text-error/90">
<span class="font-semibold">Invalid Credentials:</span> The Admin ID or Access Key entered is incorrect. Please verify and try again.
    </p>
</div><div class="relative">
<label class="font-label-sm text-label-sm mb-1 block uppercase text-error" for="admin_id">Admin ID</label>
<input class="w-full font-body-md text-body-md text-on-surface input-line pb-2 placeholder-on-surface-variant/30 font-mono border-error/50 shadow-[0_1px_10px_rgba(255,180,171,0.1)]" id="admin_id" name="admin_id" placeholder="AETH-ID-XXXX" type="text">
</div>
<div class="relative">
<label class="font-label-sm text-label-sm mb-1 block uppercase text-error" for="access_key">Access Key</label>
<input class="w-full font-body-md text-body-md text-on-surface input-line pb-2 placeholder-on-surface-variant/30 font-mono border-error/50 shadow-[0_1px_10px_rgba(255,180,171,0.1)]" id="access_key" name="access_key" placeholder="••••••••••••••••" type="password">
</div>
<button class="w-full gradient-btn text-[#000000] font-label-sm text-label-sm py-4 rounded uppercase tracking-widest mt-stack-sm hover:scale-[0.98] transition-transform duration-200" type="button" onclick="window.location.href='admin-login.html'" onclick="window.location.href='admin-login.html'">
                    Authorize Access
                </button>
</form>
<!-- Secondary Action -->
<div class="mt-stack-md">
<a class="font-label-sm text-label-sm text-error/80 hover:text-error hover:underline transition-colors uppercase flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[16px]">warning</span>
                    Emergency Override Protocol
                </a>
</div>
</div>
<!-- Footer Note -->
<div class="text-center mt-stack-md opacity-50">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">AETHER_OS v7.4.2 // SECURE CONNECTION</p>
</div>
